name: Build rm-pdfium

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']
  pull_request:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: armv7
            docker_image: eeems/remarkable-toolchain:latest-rm2
          - arch: aarch64
            docker_image: eeems/remarkable-toolchain:latest-rmpp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download xovi release
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/asivery/xovi/releases/latest | jq -r .tag_name)

          if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "Error: No xovi release found"
            exit 1
          fi

          echo "Using xovi release: $LATEST_TAG"

          curl -L -o xovi.tar.gz \
            "https://github.com/asivery/xovi/archive/refs/tags/$LATEST_TAG.tar.gz"
          tar -xzf xovi.tar.gz
          mv xovi-* xovi-repo
          rm xovi.tar.gz

      - name: Build (${{ matrix.arch }})
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            ${{ matrix.docker_image }} \
            bash -c '
              set -ex
              . /opt/codex/*/*/environment-setup-*
              export XOVI_REPO=/build/xovi-repo
              python3 $XOVI_REPO/util/xovigen.py -o xovi.c -H xovi.h rm-pdfium.xovi
              qmake .
              make
              mv rm-pdfium.so rm-pdfium-${{ matrix.arch }}.so
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rm-pdfium-${{ matrix.arch }}
          path: rm-pdfium-${{ matrix.arch }}.so
          retention-days: 90

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate changelog
        run: |
          git cliff --config-url https://gist.githubusercontent.com/rmitchellscott/823c46de7a1c3e6d57e9de90ee00d84a/raw/cliff.toml \
            --latest --strip header | tail -n +2 > CHANGELOG.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rm-pdfium-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: rm-pdfium-*.so
          body_path: CHANGELOG.md
